<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSI Christ Church - 640x384 LED Display</title>
    <style>
        /* Exact Sizing Constraints for HDPlayer 640x384 Area */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 640px;
            height: 384px;
            overflow: hidden;
            font-family: 'Arial Black', 'Impact', sans-serif;
            background: #000000;
            color: #ffffff;
        }
        
        /* The Canvas perfectly matches your HDPlayer width and height */
        .canvas {
            width: 640px;
            height: 384px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-size: 100% 100%; /* Forces the background image to fill 640x384 exactly */
            background-position: center;
            transition: background-image 0.6s ease-in-out;
        }
        
        /* Optimized Header Banner for 384px Height */
        .header-banner {
            background: linear-gradient(180deg, #ffd700 0%, #cca100 100%);
            color: #000000;
            text-align: center;
            padding: 6px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            z-index: 10;
        }
        .header-banner h1 {
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.1;
        }
        .header-banner p {
            font-family: 'Arial', sans-serif;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-top: 1px;
        }

        /* Viewport adjusted to maximize the remaining 384px vertical workspace */
        .viewport {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10px;
            z-index: 5;
        }
        .slide-content {
            width: 100%;
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            background: rgba(0, 0, 0, 0.72); /* Translucent shield layer for readability */
            padding: 14px 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Font Sizes re-balanced for 640x384 space */
        .line-1 {
            font-size: 28px;
            font-weight: 900;
            color: #ffffff;
            line-height: 1.2;
            margin-bottom: 10px;
            text-shadow: 0 3px 10px rgba(0, 0, 0, 1), 0 0 20px rgba(0, 0, 0, 0.8);
        }
        
        .line-2 {
            font-size: 22px;
            font-weight: 900;
            color: #000000;
            padding: 8px 0;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
        }
        .wedding-ribbon {
            background: linear-gradient(90deg, #ffe033 0%, #ff9900 100%);
        }
        .birthday-ribbon {
            background: linear-gradient(90deg, #00f2fe 0%, #0072ff 100%);
        }

        .line-3 {
            font-size: 20px;
            font-weight: 900;
            color: #ff2a75;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-shadow: 0 2px 5px rgba(0,0,0,1);
        }
        
        /* Auto-Spliced Extra Family Meta Line */
        .line-extra {
            font-family: 'Arial', sans-serif;
            font-size: 16px;
            font-weight: 900;
            color: #00ffcc;
            margin-top: 8px;
            text-shadow: 0 2px 4px rgba(0,0,0,1);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="canvas" id="main-canvas">
        <div class="header-banner">
            <h1>CSI Christ Church</h1>
            <p>COIMBATORE</p>
        </div>

        <div class="viewport">
            <div id="display-card" class="slide-content"></div>
        </div>
        
        <div style="height: 10px;"></div>
    </div>

    <script>
        /************************************************************************
         * BACKGROUND IMAGE CONFIG
         * These are RELATIVE paths — the images must sit in the SAME folder
         * as this HTML file, in the same branch of your GitHub repo.
         * File names are case-sensitive: "Birthday.png" and "wedding.png"
         * must match EXACTLY what's shown in your repo's file listing.
         * If the images are inside a subfolder (e.g. "images/"), use:
         *   wedding: "url('images/wedding.png')"
         ************************************************************************/
        const bgImages = {
            wedding: "url('wedding.png')",
            birthday: "url('Birthday.png')"
        };

        /************************************************************************
         * DATA REGISTRY ZONE (Put your 20 weddings and 10 birthdays here)
         ************************************************************************/
        const rawData = [
            // === WEDDINGS ===
            { husband: "ANUBALAN S", wife: "NIRMALA A", year: "2001", date: "25th June" },
            { husband: "JENIX G", wife: "RINISHA ANGELIN A", year: "2018", date: "25th June" },
            { husband: "JOHNSON KOIL RAJAN R D", wife: "AMUTHA RAJAN R", year: "1996", date: "25th June" },

            // === BIRTHDAYS ===
            { name: "Mr VASAN DEVARAJ", year: "1944", date: "26th June" }, 
            { name: "Mrs JEBA VINOLIYA A W/O AUGUSTIN GNANASEKAR", year: "1979", date: "26th June" },
            { name: "Mr ASWIN DEEPAK N S/O NATARAJAN P", year: "1998", date: "26th June" }
        ];

        const mainCanvas = document.getElementById('main-canvas');
        const displayCard = document.getElementById('display-card');
        let currentIndex = 0;
        const slideDuration = 6000; // 6 seconds per wish slide

        function updateSlide() {
            if (rawData.length === 0) return;
            
            const item = rawData[currentIndex];
            const currentYear = new Date().getFullYear();
            const milestone = currentYear - parseInt(item.year);
            
            let line1 = "";
            let line2 = "";
            let line3 = "";
            let extraLineHTML = "";
            let ribbonClass = "";

            if (item.husband && item.wife) {
                let hName = item.husband.replace(/^(Mr|Mrs|Ms)\.?\s+/i, '');
                let wName = item.wife.replace(/^(Mr|Mrs|Ms)\.?\s+/i, '');
                
                line1 = `Mr. ${hName}<br>& Mrs. ${wName}`;
                line2 = `Celebrating ${milestone} Years`;
                line3 = `Wedding Day: ${item.date}`;
                ribbonClass = "wedding-ribbon";
                mainCanvas.style.backgroundImage = bgImages.wedding;
            } 
            else if (item.name) {
                let rawName = item.name;
                let detectedExtra = "";

                const match = rawName.match(/\s+(W\/O|S\/O|D\/O|H\/O)\s+.+$/i);
                if (match) {
                    detectedExtra = match[0].trim();
                    rawName = rawName.replace(match[0], "").trim();
                }

                line1 = rawName;
                line2 = `Celebrating ${milestone} Years of Life`;
                line3 = `Birthday: ${item.date}`;
                ribbonClass = "birthday-ribbon";
                mainCanvas.style.backgroundImage = bgImages.birthday;
                
                if (detectedExtra) {
                    extraLineHTML = `<div class="line-extra">${detectedExtra.toUpperCase()}</div>`;
                }
            }

            displayCard.innerHTML = `
                <div class="line-1">${line1}</div>
                <div class="line-2 ${ribbonClass}">${line2}</div>
                <div class="line-3">${line3}</div>
                ${extraLineHTML}
            `;

            displayCard.style.animation = 'none';
            displayCard.offsetHeight; 
            displayCard.style.animation = null;

            currentIndex = (currentIndex + 1) % rawData.length;
        }

        updateSlide();
        setInterval(updateSlide, slideDuration);
    </script>
</body>
</html>
