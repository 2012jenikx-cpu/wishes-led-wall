<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSI Christ Church - Universal Fullscreen 4:3 Display</title>
    <style>
        /* Base Setup & Fullscreen Black Background */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            width: 100%;
            height: 100%;
            background: #000000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial Black', 'Impact', sans-serif;
            color: #ffffff;
            cursor: pointer;
        }
        
        /* Strict 4:3 Aspect Ratio Canvas Frame */
        .canvas {
            width: 640px;
            height: 480px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-size: cover;
            background-position: center;
            transition: background-image 0.6s ease-in-out;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            transform-origin: center center;
        }
        
        /* Top Header Banner Style */
        .header-banner {
            background: linear-gradient(180deg, #ffd700 0%, #cca100 100%);
            color: #000000;
            text-align: center;
            padding: 12px 0;
            box-shadow: 0 6px 20px rgba(0,0,0,0.8);
            z-index: 10;
        }
        .header-banner h1 {
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.1;
        }
        .header-banner p {
            font-family: 'Arial', sans-serif;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 3px;
            margin-top: 2px;
        }

        /* Centered Viewport Context Box */
        .viewport {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            z-index: 5;
        }
        .slide-content {
            width: 100%;
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            background: rgba(0, 0, 0, 0.75); /* Deep translucent layout shield */
            padding: 24px 15px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Bold Text Presentation Layers */
        .line-1 {
            font-size: 34px;
            font-weight: 900;
            color: #ffffff;
            line-height: 1.25;
            margin-bottom: 16px;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 1), 0 0 25px rgba(0, 0, 0, 0.8);
        }
        
        .line-2 {
            font-size: 26px;
            font-weight: 900;
            color: #000000;
            padding: 12px 0;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 18px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.7);
        }
        .wedding-ribbon {
            background: linear-gradient(90deg, #ffe033 0%, #ff9900 100%);
        }
        .birthday-ribbon {
            background: linear-gradient(90deg, #00f2fe 0%, #0072ff 100%);
        }

        .line-3 {
            font-size: 24px;
            font-weight: 900;
            color: #ff2a75;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 3px 6px rgba(0,0,0,1);
        }
        
        /* Auto-Spliced Extra Family Meta Line */
        .line-extra {
            font-family: 'Arial', sans-serif;
            font-size: 18px;
            font-weight: 900;
            color: #00ffcc;
            margin-top: 14px;
            text-shadow: 0 2px 5px rgba(0,0,0,1);
            letter-spacing: 1px;
        }

        /* Hides cursor in fullscreen mode for clean aesthetics */
        body:fullscreen {
            cursor: none;
        }
    </style>
</head>
<body>

    <div class="canvas" id="main-canvas">
        <div class="header-banner">
            <h1>CSI Christ Church</h1>
            <p>COIMBATORE</p>
        </div>

        <div class="viewport">
            <div id="display-card" class="slide-content"></div>
        </div>
        
        <div style="height: 15px;"></div>
    </div>

    <script>
        /************************************************************************
         * BACKGROUND IMAGE CONFIG
         * These are RELATIVE paths — the images must sit in the SAME folder
         * as this HTML file in your GitHub repo (same branch).
         * If your images are inside a subfolder, e.g. "images/", change to:
         *   wedding: "url('images/wedding-bg.png')"
         * File names are case-sensitive — must match exactly what's in the repo.
         ************************************************************************/
        const bgImages = {
            wedding: "url('wedding-bg.png')",
            birthday: "url('birthday-bg.png')"
        };

        /************************************************************************
         * DATA REGISTRY ZONE (Add your 20 weddings and 10 birthdays here)
         ************************************************************************/
        const rawData = [
            // === WEDDINGS ===
            { husband: "ANUBALAN S", wife: "NIRMALA A", year: "2001", date: "25th June" },
            { husband: "JENIX G", wife: "RINISHA ANGELIN A", year: "2018", date: "25th June" },
            { husband: "JOHNSON KOIL RAJAN R D", wife: "AMUTHA RAJAN R", year: "1996", date: "25th June" },

            // === BIRTHDAYS ===
            { name: "Mr VASAN DEVARAJ", year: "1944", date: "26th June" }, 
            { name: "Mrs JEBA VINOLIYA A W/O AUGUSTIN GNANASEKAR", year: "1979", date: "26th June" },
            { name: "Mr ASWIN DEEPAK N S/O NATARAJAN P", year: "1998", date: "26th June" }
        ];

        const mainCanvas = document.getElementById('main-canvas');
        const displayCard = document.getElementById('display-card');
        let currentIndex = 0;
        const slideDuration = 6000;

        // Auto Zoom Engine: Calculates and scales the 4:3 panel to perfectly fit the screen window
        function resizeCanvas() {
            const scaleX = window.innerWidth / 640;
            const scaleY = window.innerHeight / 480;
            // Use contain scaling or cover scaling depending on preference. 
            // Math.min fits perfectly with bars if aspect ratios mismatch; Math.max zooms to complete edges.
            const scale = Math.min(scaleX, scaleY); 
            mainCanvas.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('load', resizeCanvas);

        function updateSlide() {
            if (rawData.length === 0) return;
            
            const item = rawData[currentIndex];
            const currentYear = new Date().getFullYear();
            const milestone = currentYear - parseInt(item.year);
            
            let line1 = "";
            let line2 = "";
            let line3 = "";
            let extraLineHTML = "";
            let ribbonClass = "";

            if (item.husband && item.wife) {
                let hName = item.husband.replace(/^(Mr|Mrs|Ms)\.?\s+/i, '');
                let wName = item.wife.replace(/^(Mr|Mrs|Ms)\.?\s+/i, '');
                
                line1 = `Mr. ${hName}<br>& Mrs. ${wName}`;
                line2 = `Celebrating ${milestone} Years`;
                line3 = `Wedding Day: ${item.date}`;
                ribbonClass = "wedding-ribbon";
                mainCanvas.style.backgroundImage = bgImages.wedding;
            } 
            else if (item.name) {
                let rawName = item.name;
                let detectedExtra = "";

                const match = rawName.match(/\s+(W\/O|S\/O|D\/O|H\/O)\s+.+$/i);
                if (match) {
                    detectedExtra = match[0].trim();
                    rawName = rawName.replace(match[0], "").trim();
                }

                line1 = rawName;
                line2 = `Celebrating ${milestone} Years of Life`;
                line3 = `Birthday: ${item.date}`;
                ribbonClass = "birthday-ribbon";
                mainCanvas.style.backgroundImage = bgImages.birthday;
                
                if (detectedExtra) {
                    extraLineHTML = `<div class="line-extra">${detectedExtra.toUpperCase()}</div>`;
                }
            }

            displayCard.innerHTML = `
                <div class="line-1">${line1}</div>
                <div class="line-2 ${ribbonClass}">${line2}</div>
                <div class="line-3">${line3}</div>
                ${extraLineHTML}
            `;

            displayCard.style.animation = 'none';
            displayCard.offsetHeight; 
            displayCard.style.animation = null;

            currentIndex = (currentIndex + 1) % rawData.length;
        }

        // Fullscreen Toggle on Mouse Click
        document.body.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error entering fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });

        updateSlide();
        setInterval(updateSlide, slideDuration);
    </script>
</body>
</html>
