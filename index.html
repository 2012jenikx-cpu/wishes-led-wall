<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSI Christ Church - Universal Responsive LED Panel</title>
    <style>
        /* Modern CSS Resets for Cross-Platform Flexibility */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial Black', 'Impact', sans-serif;
            background: #000000;
            color: #ffffff;
        }
        
        /* The Canvas container scales dynamically based on the current active display size */
        .canvas {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-size: cover;
            background-position: center;
            transition: background-image 0.6s ease-in-out;
        }
        
        /* High-Contrast Dynamic Header Banner */
        .header-banner {
            background: #ffd700;
            color: #000000;
            text-align: center;
            padding: 1.5vh 0;
            box-shadow: 0 0.5vh 2vh rgba(0,0,0,0.9);
            z-index: 10;
        }
        .header-banner h1 {
            font-size: 4.5vh;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1vw;
            line-height: 1.1;
        }
        .header-banner p {
            font-family: 'Arial', sans-serif;
            font-size: 2vh;
            font-weight: bold;
            letter-spacing: 0.2vw;
            margin-top: 0.2vh;
        }

        /* Fully Fluid Adaptive Viewport Frame */
        .viewport {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2vh 3vw;
            z-index: 5;
        }
        .slide-content {
            width: 100%;
            max-width: 90vw;
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            background: rgba(0, 0, 0, 0.75);
            padding: 4vh 4vw;
            border-radius: 2vh;
            box-shadow: 0 1.5vh 4vh rgba(0,0,0,0.8);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(2vh); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Typography Scales Dynamically on Element Heights via viewport units */
        .line-1 {
            font-size: 5vh;
            font-weight: 900;
            color: #ffffff;
            line-height: 1.3;
            margin-bottom: 2.5vh;
            text-shadow: 0 0.5vh 1.5vh rgba(0, 0, 0, 1), 0 0 3vh rgba(0, 0, 0, 0.9);
        }
        
        .line-2 {
            font-size: 4vh;
            font-weight: 900;
            color: #000000;
            padding: 1.8vh 0;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.1vw;
            margin-bottom: 2.5vh;
            box-shadow: 0 0.8vh 2vh rgba(0,0,0,0.7);
        }
        .wedding-ribbon {
            background: linear-gradient(90deg, #ffe033 0%, #ff9900 100%);
        }
        .birthday-ribbon {
            background: linear-gradient(90deg, #00f2fe 0%, #0072ff 100%);
        }

        .line-3 {
            font-size: 3.5vh;
            font-weight: 900;
            color: #ff2a75;
            text-transform: uppercase;
            letter-spacing: 0.3vw;
            text-shadow: 0 0.4vh 0.8vh rgba(0,0,0,1);
        }
        
        /* Auto-generated Extra Relation Line Layout */
        .line-extra {
            font-family: 'Arial', sans-serif;
            font-size: 2.8vh;
            font-weight: 900;
            color: #00ffcc;
            margin-top: 2.2vh;
            text-shadow: 0 0.3vh 0.6vh rgba(0,0,0,1);
            letter-spacing: 0.1vw;
        }
    </style>
</head>
<body>

    <div class="canvas" id="main-canvas">
        <div class="header-banner">
            <h1>CSI Christ Church</h1>
            <p>COIMBATORE</p>
        </div>

        <div class="viewport">
            <div id="display-card" class="slide-content"></div>
        </div>
        
        <div style="height: 2vh;"></div>
    </div>

    <script>
        const bgImages = {
            wedding: "url('https://i.ibb.co/LdxYVq9/wedding-bg.png')",
            birthday: "url('https://i.ibb.co/VvZ6W5p/birthday-bg.png')"
        };

        /************************************************************************
         * DATA REGISTRY ZONE (Put your 20 weddings and 10 birthdays here)
         ************************************************************************/
        const rawData = [
            // === WEDDINGS ===
            { husband: "ANUBALAN S", wife: "NIRMALA A", year: "2001", date: "25th June" },
            { husband: "JENIX G", wife: "RINISHA ANGELIN A", year: "2018", date: "25th June" },
            { husband: "JOHNSON KOIL RAJAN R D", wife: "AMUTHA RAJAN R", year: "1996", date: "25th June" },

            // === BIRTHDAYS ===
            { name: "Mr VASAN DEVARAJ", year: "1944", date: "26th June" }, 
            { name: "Mrs JEBA VINOLIYA A W/O AUGUSTIN GNANASEKAR", year: "1979", date: "26th June" },
            { name: "Mr ASWIN DEEPAK N S/O NATARAJAN P", year: "1998", date: "26th June" }
        ];

        const mainCanvas = document.getElementById('main-canvas');
        const displayCard = document.getElementById('display-card');
        let currentIndex = 0;
        const slideDuration = 6000;

        function updateSlide() {
            if (rawData.length === 0) return;
            
            const item = rawData[currentIndex];
            const currentYear = new Date().getFullYear();
            const milestone = currentYear - parseInt(item.year);
            
            let line1 = "";
            let line2 = "";
            let line3 = "";
            let extraLineHTML = "";
            let ribbonClass = "";

            if (item.husband && item.wife) {
                let hName = item.husband.replace(/^(Mr|Mrs|Ms)\.?\s+/i, '');
                let wName = item.wife.replace(/^(Mr|Mrs|Ms)\.?\s+/i, '');
                
                line1 = `Mr. ${hName}<br>& Mrs. ${wName}`;
                line2 = `Celebrating ${milestone} Years`;
                line3 = `Wedding Day: ${item.date}`;
                ribbonClass = "wedding-ribbon";
                mainCanvas.style.backgroundImage = bgImages.wedding;
            } 
            else if (item.name) {
                let rawName = item.name;
                let detectedExtra = "";

                const match = rawName.match(/\s+(W\/O|S\/O|D\/O|H\/O)\s+.+$/i);
                if (match) {
                    detectedExtra = match[0].trim();
                    rawName = rawName.replace(match[0], "").trim();
                }

                line1 = rawName;
                line2 = `Celebrating ${milestone} Years of Life`;
                line3 = `Birthday: ${item.date}`;
                ribbonClass = "birthday-ribbon";
                mainCanvas.style.backgroundImage = bgImages.birthday;
                
                if (detectedExtra) {
                    extraLineHTML = `<div class="line-extra">${detectedExtra.toUpperCase()}</div>`;
                }
            }

            displayCard.innerHTML = `
                <div class="line-1">${line1}</div>
                <div class="line-2 ${ribbonClass}">${line2}</div>
                <div class="line-3">${line3}</div>
                ${extraLineHTML}
            `;

            // Reset CSS transitions dynamically
            displayCard.style.animation = 'none';
            displayCard.offsetHeight; 
            displayCard.style.animation = null;

            currentIndex = (currentIndex + 1) % rawData.length;
        }

        updateSlide();
        setInterval(updateSlide, slideDuration);
    </script>
</body>
</html>
