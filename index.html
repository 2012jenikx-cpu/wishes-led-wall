<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSI Christ Church - Premium Layout</title>
    <style>
        /* Sizing Constraints for HDPlayer 640x384 Area */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 640px;
            height: 384px;
            overflow: hidden;
            font-family: 'Arial Black', 'Impact', sans-serif;
            background: #000000;
            color: #ffffff;
        }
        
        /* Master Layout Canvas */
        .canvas {
            width: 640px;
            height: 384px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background-size: 100% 100%;
            background-position: center;
            transition: background-image 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        /* Modern Minimalist Floating Church Tag */
        .church-tag {
            text-align: center;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            padding: 4px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .church-tag h1 {
            color: #ffd700; /* Royal Gold */
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1.1;
        }
        .church-tag p {
            font-family: 'Arial', sans-serif;
            color: #ffffff;
            font-size: 9px;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 1px;
        }

        /* Floating Centerpiece Showcase Card */
        .viewport {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px 0;
            z-index: 5;
        }
        .slide-card {
            width: 560px;
            background: linear-gradient(135deg, rgba(10, 10, 15, 0.85) 0%, rgba(0, 0, 0, 0.9) 100%);
            padding: 18px 20px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 12px 25px rgba(0,0,0,0.8);
            animation: cardPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes cardPop {
            from { opacity: 0; transform: scale(0.92) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Elegantly Formatted Typography Lines */
        .line-names {
            font-size: 26px;
            font-weight: 900;
            color: #ffffff;
            line-height: 1.2;
            margin-bottom: 12px;
            text-shadow: 0 4px 8px rgba(0,0,0,1);
        }
        
        /* Modern Floating Badge Pill instead of full-width ribbon */
        .badge-container {
            display: flex;
            justify-content: center;
            margin-bottom: 12px;
        }
        .celebration-badge {
            font-size: 16px;
            font-weight: 900;
            color: #000000;
            padding: 6px 24px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }
        .wedding-theme {
            background: linear-gradient(90deg, #ffe033 0%, #ffaa00 100%);
        }
        .birthday-theme {
            background: linear-gradient(90deg, #00f2fe 0%, #0072ff 100%);
        }

        .line-event-date {
            font-size: 18px;
            font-weight: 900;
            color: #ff2a75;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,1);
        }
        
        /* Sub-metadata line */
        .line-relation {
            font-family: 'Arial', sans-serif;
            font-size: 14px;
            font-weight: 900;
            color: #00ffcc;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,1);
        }
    </style>
</head>
<body>

    <div class="canvas" id="main-canvas">
        <!-- Floating Header -->
        <div class="church-tag">
            <h1>CSI Christ Church</h1>
            <p>Coimbatore</p>
        </div>

        <!-- Center Stage Presenter -->
        <div class="viewport">
            <div id="display-card" class="slide-card"></div>
        </div>
        
        <!-- Bottom Safety Spacer to Frame Content Perfectly -->
        <div style="height: 5px;"></div>
    </div>

    <script>
        // Points directly to the local images inside your GitHub root directory
        const bgImages = {
            wedding: "url('wedding.png')",
            birthday: "url('birthday.png')"
        };

        /************************************************************************
         * DATA REGISTRY ZONE (Add your 20 weddings and 10 birthdays here)
         ************************************************************************/
        const rawData = [
            // === WEDDINGS ===
            { husband: "ANUBALAN S", wife: "NIRMALA A", year: "2001", date: "25th June" },
            { husband: "JENIX G", wife: "RINISHA ANGELIN A", year: "2018", date: "25th June" },
            { husband: "JOHNSON KOIL RAJAN R D", wife: "AMUTHA RAJAN R", year: "1996", date: "25th June" },

            // === BIRTHDAYS ===
            { name: "Mr VASAN DEVARAJ", year: "1944", date: "26th June" }, 
            { name: "Mrs JEBA VINOLIYA A W/O AUGUSTIN GNANASEKAR", year: "1979", date: "26th June" },
            { name: "Mr ASWIN DEEPAK N S/O NATARAJAN P", year: "1998", date: "26th June" }
        ];

        const mainCanvas = document.getElementById('main-canvas');
        const displayCard = document.getElementById('display-card');
        let currentIndex = 0;
        const slideDuration = 6000;

        function updateSlide() {
            if (rawData.length === 0) return;
            
            const item = rawData[currentIndex];
            const currentYear = new Date().getFullYear();
            const milestone = currentYear - parseInt(item.year);
            
            let namesLine = "";
            let badgeText = "";
            let dateLine = "";
            let relationLineHTML = "";
            let themeClass = "";

            if (item.husband && item.wife) {
                let hName = item.husband.replace(/^(Mr|Mrs|Ms)\.?\s+/i, '');
                let wName = item.wife.replace(/^(Mr|Mrs|Ms)\.?\s+/i, '');
                
                namesLine = `Mr. ${hName} & Mrs. ${wName}`;
                badgeText = `Celebrating ${milestone} Years`;
                dateLine = `Wedding Day: ${item.date}`;
                themeClass = "wedding-theme";
                mainCanvas.style.backgroundImage = bgImages.wedding;
            } 
            else if (item.name) {
                let rawName = item.name;
                let detectedExtra = "";

                const match = rawName.match(/\s+(W\/O|S\/O|D\/O|H\/O)\s+.+$/i);
                if (match) {
                    detectedExtra = match[0].trim();
                    rawName = rawName.replace(match[0], "").trim();
                }

                namesLine = rawName;
                badgeText = `${milestone} Years of Life`;
                dateLine = `Birthday: ${item.date}`;
                themeClass = "birthday-theme";
                mainCanvas.style.backgroundImage = bgImages.birthday;
                
                if (detectedExtra) {
                    relationLineHTML = `<div class="line-relation">${detectedExtra}</div>`;
                }
            }

            displayCard.innerHTML = `
                <div class="line-names">${namesLine}</div>
                <div class="badge-container">
                    <div class="celebration-badge ${themeClass}">${badgeText}</div>
                </div>
                <div class="line-event-date">${dateLine}</div>
                ${relationLineHTML}
            `;

            displayCard.style.animation = 'none';
            displayCard.offsetHeight; 
            displayCard.style.animation = null;

            currentIndex = (currentIndex + 1) % rawData.length;
        }

        updateSlide();
        setInterval(updateSlide, slideDuration);
    </script>
</body>
</html>
