<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Church LED Display - Celebration Showcase</title>
    <style>
        /* Base configuration derived from your working LED wall template */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: black; 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; 
        }
        #bg { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-size: cover; 
            background-position: center; 
            transition: background-image 0.8s ease-in-out; 
        }
        .overlay { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: radial-gradient(circle, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 100%); 
            z-index: 5; 
        }
        .container { 
            position: relative; 
            z-index: 10; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100%; 
            padding: 20px; 
            text-align: center; 
            box-sizing: border-box;
        }

        /* Modern Premium Glassmorphic Container */
        .ui-card {
            background: ;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            padding: 35px 40px;
            border-radius: 24px;
            max-width: 90%;
            width: 580px;
            box-sizing: border-box;
        }
        
        /* Modern Premium Dynamic Heading Badge */
        #heading-line {
            display: inline-block;
            font-size: 16px;
            color: #ffd700; 
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 22px;
            background: rgba(255, 215, 0, 0.1);
            padding: 6px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 215, 0, 0.25);
        }

        /* High-Performance Readable Typography Layers */
        #names-line { 
            font-size: 36px; 
            font-weight: 900; 
            color: #ffffff;
            text-shadow: 0 4px 12px rgba(0,0,0,0.6);
            line-height: 1.4; 
            margin-bottom: 16px; 
        }
        #milestone-line { 
            font-size: 22px; 
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 18px;
        }
        #date-line {
            font-size: 20px;
            color: #ff477e; 
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        
        .watermark { 
            position: absolute; 
            bottom: 20px; 
            left: 30px; 
            font-size: 14px; 
            font-weight: 800; 
            color: rgba(255, 255, 255, 0.35); 
            z-index: 20; 
            letter-spacing: 3px; 
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div class="overlay"></div>
    
    <div class="container">
        <div class="ui-card">
            <div id="heading-line"></div>
            <div id="names-line">Loading...</div>
            <div id="milestone-line"></div>
            <div id="date-line"></div>
        </div>
    </div>
    
    <div class="watermark">MEDIATEAM</div>

    <script>
        /************************************************************************
         * DISPLAY SETTINGS (DURATION CONTROL)
         * Change 7000 to your desired speed (in milliseconds)
         ************************************************************************/
        const slideDuration = 3000; // 7000 = 7 seconds per slide

        // Binds local .jpeg background image files from your repository root
        const bgImages = {
            wedding: "url('wedding.jpeg')",
            birthday: "url('birthday.jpeg')"
        };

        /************************************************************************
         * DATA REGISTRY ZONE
         * Paste, add, modify or remove items safely here. 
         * Ensure every intermediate item ends with a comma (,).
         ************************************************************************/
        const rawData = [
            // === WEDDINGS ===
            { husband: "ANUBALAN S", wife: "NIRMALA A", year: "2001", date: "25th June" },
            { husband: "JENIX G", wife: "RINISHA ANGELIN A", year: "2018", date: "25th June" },
            { husband: "JOHNSON KOIL RAJAN R D", wife: "AMUTHA RAJAN R", year: "1996", date: "25th June" },

            // === BIRTHDAYS ===
            { name: "Mr VASAN DEVARAJ", year: "1944", date: "26th June" }, 
            { name: "Mrs JEBA VINOLIYA A ", year: "1979", date: "26th June" },
            { name: "Mr ASWIN DEEPAK N", year: "1998", date: "26th June" }
        ];

        let currentIndex = 0;

        function refreshContent() {
            try {
                if (!rawData || rawData.length === 0) return;
                
                const item = rawData[currentIndex];
                const currentYear = new Date().getFullYear();
                
                let parsedYear = parseInt(item.year);
                if (isNaN(parsedYear)) parsedYear = currentYear;
                const milestone = currentYear - parsedYear;
                
                let headingText = "";
                let names = "";
                let milestoneText = "";
                let dateText = "";

                if (item.husband && item.wife) {
                    let hName = item.husband.replace(/^(Mr|Mrs|Ms)\.?\s+/i, '');
                    let wName = item.wife.replace(/^(Mr|Mrs|Ms)\.?\s+/i, '');
                    
                    headingText = "Wedding Wish";
                    names = `Mr. ${hName}<br>& Mrs. ${wName}`;
                    milestoneText = `Celebrating ${milestone} Years of Marriage`;
                    dateText = `Wedding Day: ${item.date || ''}`;
                    document.getElementById('bg').style.backgroundImage = bgImages.wedding;
                } 
                else if (item.name) {
                    headingText = "Birthday Wish";
                    names = item.name; 
                    milestoneText = `Celebrating ${milestone} Years of Life`;
                    dateText = `Birthday: ${item.date || ''}`;
                    document.getElementById('bg').style.backgroundImage = bgImages.birthday;
                }

                document.getElementById('heading-line').innerText = headingText;
                document.getElementById('names-line').innerHTML = names;
                document.getElementById('milestone-line').innerText = milestoneText;
                document.getElementById('date-line').innerText = dateText;

            } catch (error) {
                console.error("Gracefully caught slide execution error at index: " + currentIndex, error);
            } finally {
                currentIndex = (currentIndex + 1) % rawData.length;
            }
        }

        refreshContent();
        setInterval(refreshContent, slideDuration);
    </script>
</body>
</html>
